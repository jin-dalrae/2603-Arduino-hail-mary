<!DOCTYPE html>
<html>

<head>
    <title>Rae & Yoyo's Prototyping</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accel-color: #00bcd4;
            --gyro-color: #ff9800;
            --accent: #6200ea;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .main-container {
            width: 90%;
            max-width: 1200px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
        }

        h1 {
            margin: 0;
            font-size: 2.5em;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .status {
            font-size: 0.9em;
            color: #888;
            margin-top: 5px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            font-size: 1.1em;
            color: #aaa;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent);
            padding-left: 10px;
        }

        .value-display {
            display: flex;
            justify-content: space-around;
            font-family: 'Courier New', Courier, monospace;
        }

        .val-box {
            text-align: center;
        }

        .val-label {
            font-size: 0.8em;
            color: #888;
        }

        .val-num {
            font-size: 1.8em;
            font-weight: bold;
        }

        .accel-text {
            color: var(--accel-color);
        }

        .gyro-text {
            color: var(--gyro-color);
        }

        .chart-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .servo-viz {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
        }

        .servo-scene {
            position: relative;
            width: 200px;
            height: 300px;
            margin: 0 auto;
            border: 2px solid #333;
            border-radius: 12px;
            overflow: hidden;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
        }

        .servo-track {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 80%;
            top: 10%;
            background: #333;
            border-radius: 4px;
        }

        .servo-ball {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #ff6b6b, #c0392b);
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.5);
            transition: bottom 0.3s ease-out;
        }

        .servo-label {
            margin-top: 15px;
            font-size: 1.4em;
            font-family: 'Courier New', monospace;
            color: #ff9800;
        }

        .servo-state {
            font-size: 0.9em;
            color: #888;
            margin-top: 5px;
        }

        .direction-arrow {
            font-size: 2em;
            margin-top: 10px;
            transition: opacity 0.3s;
        }
    </style>
</head>

<body>
    <div class="main-container">
        <header>
            <h1>Rae & yoyo's Prototyping</h1>
            <div class="status" id="status">Choose a connection method below</div>
            <div style="margin-top:10px;">
                <button id="btnSerial"
                    style="padding:8px 20px;font-size:1em;border:none;border-radius:6px;background:#6200ea;color:#fff;cursor:pointer;">
                    Connect USB (Web Serial)
                </button>
            </div>
        </header>

        <div class="dashboard">
            <div class="card">
                <div class="card-header">Accelerometer (m/s²)</div>
                <div class="value-display accel-text">
                    <div class="val-box">
                        <div class="val-label">X</div>
                        <div class="val-num" id="ax">0.0</div>
                    </div>
                    <div class="val-box">
                        <div class="val-label">Y</div>
                        <div class="val-num" id="ay">0.0</div>
                    </div>
                    <div class="val-box">
                        <div class="val-label">Z</div>
                        <div class="val-num" id="az">0.0</div>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-header">Gyroscope (dps)</div>
                <div class="value-display gyro-text">
                    <div class="val-box">
                        <div class="val-label">GX</div>
                        <div class="val-num" id="gx">0.0</div>
                    </div>
                    <div class="val-box">
                        <div class="val-label">GY</div>
                        <div class="val-num" id="gy">0.0</div>
                    </div>
                    <div class="val-box">
                        <div class="val-label">GZ</div>
                        <div class="val-num" id="gz">0.0</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="servo-viz card">
            <div class="card-header" style="text-align:left;">Servo / Ball Position</div>
            <div style="display:flex; justify-content:center; align-items:center; gap:40px;">
                <div class="servo-scene">
                    <div class="servo-track"></div>
                    <div class="servo-ball" id="servoBall"></div>
                </div>
                <div>
                    <div class="servo-label">Angle: <span id="servoAngle">90</span>&deg;</div>
                    <div class="servo-state" id="servoState">Centered</div>
                    <div class="direction-arrow" id="dirArrow" style="color:#00bcd4;">--</div>
                </div>
            </div>
        </div>

        <div class="chart-container card">
            <div class="card-header">Accelerometer Real-time Chart</div>
            <canvas id="accelChart" height="100"></canvas>
        </div>

        <div class="chart-container card">
            <div class="card-header">Gyroscope Real-time Chart</div>
            <canvas id="gyroChart" height="100"></canvas>
        </div>

        <div class="card" style="margin-bottom:20px;">
            <div class="card-header">Debug Log (raw serial data)</div>
            <pre id="debugLog" style="color:#0f0;font-size:0.8em;max-height:150px;overflow-y:auto;margin:0;"></pre>
        </div>
    </div>

    <script>
        const statusDisplay = document.getElementById('status');
        const vals = {
            ax: document.getElementById('ax'), ay: document.getElementById('ay'), az: document.getElementById('az'),
            gx: document.getElementById('gx'), gy: document.getElementById('gy'), gz: document.getElementById('gz')
        };

        const commonOptions = {
            responsive: true, animation: false, scales: { y: { grid: { color: '#333' } }, x: { display: false } },
            plugins: { legend: { labels: { color: '#ccc' } } }
        };

        const accelChart = new Chart(document.getElementById('accelChart'), {
            type: 'line',
            data: {
                labels: [], datasets: [
                    { label: 'AX', data: [], borderColor: '#00bcd4', borderWidth: 1, pointRadius: 0 },
                    { label: 'AY', data: [], borderColor: '#ff4081', borderWidth: 1, pointRadius: 0 },
                    { label: 'AZ', data: [], borderColor: '#8bc34a', borderWidth: 1, pointRadius: 0 }
                ]
            },
            options: { ...commonOptions, scales: { y: { min: -15, max: 15 } } }
        });

        const gyroChart = new Chart(document.getElementById('gyroChart'), {
            type: 'line',
            data: {
                labels: [], datasets: [
                    { label: 'GX', data: [], borderColor: '#ff9800', borderWidth: 1, pointRadius: 0 },
                    { label: 'GY', data: [], borderColor: '#e91e63', borderWidth: 1, pointRadius: 0 },
                    { label: 'GZ', data: [], borderColor: '#3f51b5', borderWidth: 1, pointRadius: 0 }
                ]
            },
            options: { ...commonOptions, scales: { y: { min: -200, max: 200 } } }
        });

        const servoBall = document.getElementById('servoBall');
        const servoAngleEl = document.getElementById('servoAngle');
        const servoState = document.getElementById('servoState');
        const dirArrow = document.getElementById('dirArrow');
        let currentServoPos = 90;
        let targetServoPos = 90;

        // Simulate servo gradual movement (matches Uno: 1 deg / 15ms)
        setInterval(() => {
            if (currentServoPos < targetServoPos) currentServoPos++;
            else if (currentServoPos > targetServoPos) currentServoPos--;

            // Map servo 0-180 to ball position (0=bottom, 180=top)
            const pct = currentServoPos / 180;
            const bottomPx = 10 + pct * 75; // 10% to 85% of container
            servoBall.style.bottom = bottomPx + '%';

            servoAngleEl.textContent = currentServoPos;
        }, 15);

        function handleData(data) {
            for (let key in vals) { vals[key].innerText = data[key].toFixed(2); }
            updateChart(accelChart, [data.ax, data.ay, data.az]);
            updateChart(gyroChart, [data.gx, data.gy, data.gz]);

            // Mirror servo logic from Uno code
            const az = data.az;
            if (az < -2.0) {
                targetServoPos = 180;
                servoState.textContent = 'Sensor UP — pushing ball up';
                servoState.style.color = '#8bc34a';
                dirArrow.textContent = '↑↑↑';
                dirArrow.style.color = '#8bc34a';
            } else if (az > 2.0) {
                targetServoPos = 0;
                servoState.textContent = 'Sensor DOWN — reversing to push up';
                servoState.style.color = '#ff4081';
                dirArrow.textContent = '↓↓↓';
                dirArrow.style.color = '#ff4081';
            } else {
                servoState.textContent = 'Dead zone — holding';
                servoState.style.color = '#888';
                dirArrow.textContent = '--';
                dirArrow.style.color = '#888';
            }
        }

        function updateChart(chart, newData) {
            chart.data.labels.push("");
            newData.forEach((val, i) => chart.data.datasets[i].data.push(val));
            if (chart.data.labels.length > 100) { chart.data.labels.shift(); chart.data.datasets.forEach(d => d.data.shift()); }
            chart.update('none');
        }

        const debugLog = document.getElementById('debugLog');
        let lineCount = 0;

        function logDebug(msg) {
            lineCount++;
            debugLog.textContent += `[${lineCount}] ${msg}\n`;
            debugLog.scrollTop = debugLog.scrollHeight;
        }

        function parseLine(line) {
            const trimmed = line.trim();
            if (!trimmed) return null;
            const p = trimmed.split(',');
            logDebug(`raw: "${trimmed}" → ${p.length} parts`);
            if (p.length === 6) {
                return { ax: +p[0], ay: +p[1], az: +p[2], gx: +p[3], gy: +p[4], gz: +p[5] };
            }
            return null;
        }

        // --- Web Serial (USB direct) ---
        document.getElementById('btnSerial').addEventListener('click', async () => {
            if (!('serial' in navigator)) {
                alert('Web Serial not supported. Use Chrome or Edge.');
                return;
            }
            try {
                const port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                statusDisplay.innerText = "USB Connected! Receiving data...";

                const reader = port.readable.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                logDebug("Port opened, waiting for data...");

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) { logDebug("Reader done."); break; }
                    const chunk = decoder.decode(value, { stream: true });
                    buffer += chunk;

                    // Log first few raw chunks to debug
                    if (lineCount < 5) logDebug(`chunk(${chunk.length} bytes): "${chunk.substring(0, 60)}"`);

                    let lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        const data = parseLine(line);
                        if (data) handleData(data);
                    }
                }
            } catch (e) {
                statusDisplay.innerText = "USB Error: " + e.message;
            }
        });

        // --- Auto-connect to bridge.py WebSocket ---
        function connectWebSocket() {
            const socket = new WebSocket('ws://localhost:8765');
            socket.onopen = () => {
                statusDisplay.innerText = "Connected to bridge.py! Receiving data...";
                logDebug("WebSocket connected");
            };
            socket.onclose = () => {
                logDebug("WebSocket closed, retrying in 3s...");
                setTimeout(connectWebSocket, 3000);
            };
            socket.onerror = () => {}; // suppress console errors
            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleData(data);
            };
        }
        connectWebSocket();

    </script>
</body>

</html>
